[tool.uv.workspace]
members = [
    "packages/shared",
    "services/tenant",
    "services/sandbox",
    "services/inference-gw",
    "services/billing",
]

[tool.uv]
dev-dependencies = [
    "pytest>=9.0",
    "pytest-asyncio>=1.0",
    "httpx>=0.27",
    "ruff>=0.15",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
addopts = "--import-mode=importlib"
# 讓 pytest 直接找到所有 src 目錄，不需要 pip install 本地套件
pythonpath = [
    "packages/shared/src",
    "services/tenant/src",
    "services/sandbox/src",
    "services/inference-gw/src",
    "services/billing/src",
]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.mypy]
python_version = "3.12"
strict = true
